name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + unit + contract + integration (Testcontainers)
    runs-on: ubuntu-latest
    # Docker is available on ubuntu-latest, so the Testcontainers PostgreSQL ITs run here for the
    # first time (they cannot run on the AF_UNIX-broken Windows dev machine).
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Build, test and verify (incl. integration tests)
        # `verify` runs surefire (unit + contract) and failsafe (*IT with Testcontainers).
        run: ./mvnw -B --no-transfer-progress verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 7
