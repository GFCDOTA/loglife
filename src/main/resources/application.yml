spring:
  application:
    name: loglife
  datasource:
    url: ${LOGLIFE_DB_URL:jdbc:postgresql://localhost:5432/loglife}
    username: ${LOGLIFE_DB_USER:loglife}
    password: ${LOGLIFE_DB_PASSWORD:loglife}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: false

server:
  port: ${LOGLIFE_PORT:8080}
  # Loopback-only by default. To use from the iPhone on the LAN:
  #   LOGLIFE_BIND=0.0.0.0 and set LOGLIFE_API_TOKEN (the PWA stores it in localStorage).
  address: ${LOGLIFE_BIND:127.0.0.1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

loglife:
  security:
    # Empty = no auth (loopback-only default makes that safe). Set when binding to the LAN.
    api-token: ${LOGLIFE_API_TOKEN:}
  cors:
    # The bundled PWA is same-origin and needs no CORS, so the default is empty (no cross-origin).
    # Set explicit origins to allow a separately hosted UI, e.g. LOGLIFE_CORS_ORIGINS=http://192.168.0.10:8080
    allowed-origins: ${LOGLIFE_CORS_ORIGINS:}
  nutrition:
    # "Today" for date-less entries (voice/shortcut). Dates normally come from the client.
    timezone: ${LOGLIFE_TIMEZONE:America/Sao_Paulo}
    estimation:
      # Which local agent to use as the primary estimator: mock | local-agent | ollama
      # Default is "mock" so the app boots and tests run with zero external dependencies.
      provider: ${LOGLIFE_ESTIMATION_PROVIDER:mock}
      # false = no silent mock fallback: a failing primary surfaces as 503 to the client.
      fallback-to-mock: ${LOGLIFE_ESTIMATION_FALLBACK_TO_MOCK:true}
      local-agent:
        base-url: ${LOGLIFE_LOCAL_AGENT_URL:http://localhost:8787}
        timeout: 5s
      ollama:
        base-url: ${LOGLIFE_OLLAMA_URL:http://localhost:11434}
        model: ${LOGLIFE_OLLAMA_MODEL:llama3.1:8b}
        # Read timeout is generous (cold model load); connect is short so a down Ollama
        # falls back to the mock quickly. keep-alive keeps the model warm between calls.
        timeout: ${LOGLIFE_OLLAMA_TIMEOUT:120s}
        connect-timeout: ${LOGLIFE_OLLAMA_CONNECT_TIMEOUT:5s}
        keep-alive: ${LOGLIFE_OLLAMA_KEEP_ALIVE:30m}

logging:
  level:
    com.loglife: INFO
